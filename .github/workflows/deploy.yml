name: Deploy swais.in

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 20

            echo ">>> Cloning or pulling latest code..."
            if [ -d "/home/ubuntu/test-box" ]; then
              cd /home/ubuntu/test-box
              git pull origin main
            else
              git clone https://github.com/Swais-AI/test_box.git /home/ubuntu/test-box
              cd /home/ubuntu/test-box
            fi

            echo ">>> Installing dependencies..."
            npm install

            echo ">>> Building app..."
            npm run build

            echo ">>> Starting app on port 4001..."
            pm2 stop test-box 2>/dev/null || true
            pm2 delete test-box 2>/dev/null || true
            PORT=4001 pm2 start npm --name "test-box" -- start
            pm2 save

            echo "Deploy complete!"
